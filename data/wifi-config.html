<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wi-Fi Configuration</title>
  <link rel="stylesheet" href="/main.css">
</head>
<body>
  <div class="container">
    <h2>Wi-Fi Configuration</h2>
    
    <!-- Сообщения об успехе/ошибке -->
    <div id="messageContainer" style="display:none;"></div>
    
    <!-- Блок статуса подключения -->
    <div class="status-container" id="statusContainer">
      <h3>Current Connection Status</h3>
      <div id="connectionStatus" class="status-info">
        <p>Loading...</p>
      </div>
      <button class="disconnect-btn" id="disconnectBtn" onclick="disconnectWiFi()" style="display:none;">
        Disconnect & Switch to Access Point
      </button>
    </div>
    
    <hr style="margin: 20px 0; border: none; border-top: 1px solid #ddd;">
    
    <button class="scan-btn" onclick="scanNetworks()">Scan Networks</button>
    <div class="network-list" id="networkList"></div>
    <form id="wifiForm" onsubmit="saveWiFi(event)">
      <div class="form-group">
        <label for="ssid">Network SSID:</label>
        <input type="text" id="ssid" name="ssid" required>
      </div>
      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password">
      </div>
      <button class="save-btn" type="submit">Save & Connect</button>
    </form>
  </div>
  <div class="nav-container">
    <a href="/">Back to main page</a>
  </div>
  <script>
    function scanNetworks() {
      fetch('/scanwifi')
        .then(response => response.json())
        .then(data => {
          const list = document.getElementById('networkList');
          list.innerHTML = '';
          data.networks.forEach(network => {
            const item = document.createElement('div');
            item.className = 'network-item';
            item.textContent = network.ssid + ' (' + network.rssi + ' dBm)';
            item.onclick = () => {
              document.getElementById('ssid').value = network.ssid;
            };
            list.appendChild(item);
          });
        });
    }
    
    function updateWiFiStatus() {
      fetch('/wifistatus')
        .then(response => response.json())
        .then(data => {
          const statusDiv = document.getElementById('connectionStatus');
          const disconnectBtn = document.getElementById('disconnectBtn');
          
          if (data.connected) {
            statusDiv.innerHTML = `
              <p><strong>Status:</strong> <span style="color: #4CAF50;">Connected</span></p>
              <p><strong>Network:</strong> ${data.ssid}</p>
              <p><strong>IP Address:</strong> ${data.ip}</p>
              <p><strong>Signal Strength:</strong> ${data.rssi} dBm</p>
            `;
            disconnectBtn.style.display = 'inline-block';
          } else if (data.mode === 'access_point') {
            statusDiv.innerHTML = `
              <p><strong>Status:</strong> <span style="color: #ff9800;">Access Point Mode</span></p>
              <p><strong>AP Name:</strong> ${data.ssid}</p>
              <p><strong>IP Address:</strong> ${data.ip}</p>
            `;
            disconnectBtn.style.display = 'none';
          } else {
            statusDiv.innerHTML = `
              <p><strong>Status:</strong> <span style="color: #f44336;">Not Connected</span></p>
            `;
            disconnectBtn.style.display = 'none';
          }
        })
        .catch(error => {
          console.error('Error fetching WiFi status:', error);
          document.getElementById('connectionStatus').innerHTML = 
            '<p style="color: #f44336;">Error loading status</p>';
        });
    }
    
    function saveWiFi(event) {
      event.preventDefault(); // Предотвращаем стандартную отправку формы
      
      const form = document.getElementById('wifiForm');
      const formData = new FormData(form);
      const ssid = formData.get('ssid');
      const password = formData.get('password');
      
      // Показываем сообщение о процессе
      const messageContainer = document.getElementById('messageContainer');
      messageContainer.innerHTML = `
        <div style="background-color: #e3f2fd; border-left: 4px solid #2196F3; padding: 15px; margin-bottom: 20px; border-radius: 6px;">
          <h3 style="color: #2196F3; margin: 0 0 10px 0;">Connecting to WiFi...</h3>
          <p style="margin: 0;">Please wait, this may take a few seconds.</p>
        </div>
      `;
      messageContainer.style.display = 'block';
      
      // Отправляем данные через fetch (URL не изменится!)
      fetch('/savewifi', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: `ssid=${encodeURIComponent(ssid)}&password=${encodeURIComponent(password)}`
      })
      .then(response => {
        // Пытаемся прочитать как JSON
        return response.json().catch(() => {
          // Если не JSON, читаем как текст
          return response.text().then(text => ({ status: response.ok ? 'success' : 'error', message: text }));
        });
      })
      .then(data => {
        // Проверяем статус ответа
        if (data.status === 'success' || (typeof data === 'string' && data.includes('successfully'))) {
          messageContainer.innerHTML = `
            <div style="background-color: #e8f5e8; border-left: 4px solid #4CAF50; padding: 15px; margin-bottom: 20px; border-radius: 6px;">
              <h3 style="color: #4CAF50; margin: 0 0 10px 0;">WiFi configured successfully!</h3>
              <p style="margin: 0;">${data.message || 'Device will reboot in a moment...'}</p>
            </div>
          `;
          // Редирект через 2 секунды
          setTimeout(() => {
            window.location.href = '/wifi-config';
          }, 2000);
        } else {
          // Ошибка подключения
          messageContainer.innerHTML = `
            <div style="background-color: #ffebee; border-left: 4px solid #f44336; padding: 15px; margin-bottom: 20px; border-radius: 6px;">
              <h3 style="color: #f44336; margin: 0 0 10px 0;">Failed to connect to WiFi</h3>
              <p style="margin: 0;">${data.message || 'Please check your credentials and try again.'}</p>
            </div>
          `;
          // Обновляем статус WiFi
          setTimeout(() => {
            updateWiFiStatus();
          }, 1000);
        }
      })
      .catch(error => {
        console.error('Error saving WiFi:', error);
        messageContainer.innerHTML = `
          <div style="background-color: #ffebee; border-left: 4px solid #f44336; padding: 15px; margin-bottom: 20px; border-radius: 6px;">
            <h3 style="color: #f44336; margin: 0 0 10px 0;">Error connecting to WiFi</h3>
            <p style="margin: 0;">Please try again later.</p>
          </div>
        `;
        updateWiFiStatus();
      });
    }
    
    function disconnectWiFi() {
      if (confirm('Are you sure you want to disconnect and switch to Access Point mode? The device will restart.')) {
        fetch('/disconnectwifi', { method: 'POST' })
          .then(response => response.json())
          .then(data => {
            alert(data.message || 'Disconnecting... Device will restart.');
            setTimeout(() => {
              window.location.reload();
            }, 2000);
          })
          .catch(error => {
            console.error('Error disconnecting:', error);
            alert('Error disconnecting. Please try again.');
          });
      }
    }
    
    // Проверка параметров URL для отображения сообщений
    function checkURLParams() {
      const urlParams = new URLSearchParams(window.location.search);
      const messageContainer = document.getElementById('messageContainer');
      
      if (urlParams.get('success') === 'true') {
        messageContainer.innerHTML = `
          <div style="background-color: #e8f5e8; border-left: 4px solid #4CAF50; padding: 15px; margin-bottom: 20px; border-radius: 6px;">
            <h3 style="color: #4CAF50; margin: 0 0 10px 0;">WiFi configured successfully!</h3>
            <p style="margin: 0;">Device will reboot in a moment...</p>
          </div>
        `;
        messageContainer.style.display = 'block';
        // Очищаем параметры из URL через 5 секунд
        setTimeout(() => {
          window.history.replaceState({}, document.title, '/wifi-config');
          messageContainer.style.display = 'none';
        }, 5000);
      } else if (urlParams.get('error') === 'true') {
        messageContainer.innerHTML = `
          <div style="background-color: #ffebee; border-left: 4px solid #f44336; padding: 15px; margin-bottom: 20px; border-radius: 6px;">
            <h3 style="color: #f44336; margin: 0 0 10px 0;">Failed to connect to WiFi</h3>
            <p style="margin: 0;">Please check your credentials and try again.</p>
          </div>
        `;
        messageContainer.style.display = 'block';
        // Очищаем параметры из URL через 5 секунд
        setTimeout(() => {
          window.history.replaceState({}, document.title, '/wifi-config');
          messageContainer.style.display = 'none';
        }, 5000);
      }
    }
    
    // Автоматически обновлять статус при загрузке страницы
    window.onload = function() {
      checkURLParams(); // Проверяем параметры URL
      updateWiFiStatus();
      // Обновлять статус каждые 5 секунд
      setInterval(updateWiFiStatus, 5000);
    };
  </script>
</body>
</html>
