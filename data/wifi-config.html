<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Настройка Wi-Fi</title>
  <link rel="stylesheet" href="main.css">
  <style>
    /* Основные стили остаются без изменений, только перевод */
    .wifi-status {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.1));
      padding: 25px;
      border-radius: 20px;
      margin-bottom: 30px;
      border: 2px solid rgba(99, 102, 241, 0.2);
      position: relative;
      overflow: hidden;
    }

    .wifi-status::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(to right, var(--primary), var(--secondary));
    }

    .wifi-status h3 {
      margin-top: 0;
      margin-bottom: 20px;
      text-align: center;
      color: var(--primary);
      font-size: 1.4rem;
      font-weight: 700;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-top: 15px;
    }

    .status-item {
      background: white;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid var(--gray-light);
      transition: all 0.3s ease;
    }

    .status-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      border-color: var(--primary);
    }

    .status-label {
      font-size: 0.9rem;
      color: var(--gray);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .status-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--dark);
    }

    .status-connected .status-value {
      color: var(--success);
    }

    .status-disconnected .status-value {
      color: var(--danger);
    }

    .status-ap .status-value {
      color: var(--warning);
    }

    .network-card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 15px;
      border: 2px solid var(--gray-light);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .network-card:hover {
      border-color: var(--primary);
    }

    .network-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.1), transparent);
      transition: 0.5s;
    }

    .network-card:hover::after {
      left: 100%;
    }

    .network-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .network-name {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .network-security {
      height: 10px;
    }

    .network-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .network-rssi {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 6px 15px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9rem;
      min-width: 80px;
      text-align: center;
    }

    .network-expand-btn {
      background: none;
      border: none;
      color: var(--gray);
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    .network-expand-btn:hover {
      background: var(--gray-light);
      color: var(--primary);
    }

    .network-expand-btn svg {
      transition: transform 0.3s ease;
    }

    .network-card.expanded .network-expand-btn svg {
      transform: rotate(180deg);
    }

    .network-connect-form {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, margin-top 0.3s ease;
      margin-top: 0;
    }

    .network-card.expanded .network-connect-form {
      max-height: 250px;
      margin-top: 20px;
      border-top: 1px solid var(--gray-light);
      padding-top: 20px;
    }

    .network-connect-form .input-group {
      position: relative;
      margin-bottom: 15px;
    }

    .network-connect-form input {
      width: 100%;
      padding: 14px 50px 14px 50px;
      border: 2px solid var(--gray-light);
      border-radius: 12px;
      font-size: 1rem;
      transition: all 0.3s ease;
      background: white;
    }

    .network-connect-form input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .network-connect-form .input-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
    }

    .network-connect-form .password-toggle {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--gray);
      cursor: pointer;
      padding: 5px;
    }

    .network-connect-form .password-toggle:hover {
      color: var(--primary);
    }

    .network-connect-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--success), #34d399);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .network-connect-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
    }

    .network-connect-btn:active {
      transform: translateY(0);
    }

    .signal-strength {
      display: inline-block;
      width: 80px;
      height: 20px;
      background: var(--gray-light);
      border-radius: 10px;
      position: relative;
      overflow: hidden;
    }

    .signal-level {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: linear-gradient(to right, var(--danger), var(--warning), var(--success));
      border-radius: 10px;
    }

    .message-box {
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 25px;
      animation: slideIn 0.5s ease-out;
      display: none;
    }

    .message-success {
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(52, 211, 153, 0.1));
      border: 2px solid var(--success);
      color: var(--success);
    }

    .message-error {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(248, 113, 113, 0.1));
      border: 2px solid var(--danger);
      color: var(--danger);
    }

    .message-info {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1));
      border: 2px solid var(--primary);
      color: var(--primary);
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-weight: 700;
      font-size: 1.2rem;
    }

    .scan-progress {
      text-align: center;
      padding: 30px;
      display: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--gray-light);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 30px 0;
      color: var(--gray);
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gray-light), transparent);
    }

    .divider span {
      padding: 0 20px;
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .wifi-form-container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      margin-top: 30px;
      border: 1px solid var(--gray-light);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    }

    .form-icon {
      text-align: center;
      margin-bottom: 25px;
    }

    .form-icon svg {
      width: 64px;
      height: 64px;
      color: var(--primary);
      filter: drop-shadow(0 4px 8px rgba(99, 102, 241, 0.3));
    }

    .manual-input-group {
      position: relative;
      margin-bottom: 25px;
    }

    .manual-input-group input {
      width: 100%;
      padding: 16px 50px 16px 50px;
      border: 2px solid var(--gray-light);
      border-radius: 12px;
      font-size: 1.1rem;
      transition: all 0.3s ease;
      background: white;
    }

    .manual-input-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .manual-input-group .input-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
    }

    .manual-input-group .password-toggle {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--gray);
      cursor: pointer;
      padding: 5px;
    }

    .manual-input-group .password-toggle:hover {
      color: var(--primary);
    }

    /* Новая навигация снизу */
    .bottom-nav {
      margin-top: 50px;
      text-align: center;
      padding: 20px;
      border-top: 1px solid var(--gray-light);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 30px;
      background: var(--gray-light);
      color: var(--dark);
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .back-link:hover {
      background: var(--primary);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
    }

    @media (max-width: 768px) {
      .status-grid {
        grid-template-columns: 1fr;
      }

      .network-card {
        padding: 15px;
      }

      .network-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .network-info {
        width: 100%;
        justify-content: space-between;
      }

      .wifi-form-container {
        padding: 20px;
      }

      .manual-input-group input {
        padding: 14px 45px 14px 45px;
      }
    }

    .wifi-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
      opacity: 0.1;
    }

    .wifi-bg svg {
      position: absolute;
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div class="wifi-bg">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <path d="M50 10A40 40 0 1 0 50 90 40 40 0 1 0 50 10z" fill="none" stroke="currentColor" stroke-width="0.5" />
      <path d="M50 20A30 30 0 1 0 50 80 30 30 0 1 0 50 20z" fill="none" stroke="currentColor" stroke-width="0.5" />
      <path d="M50 30A20 20 0 1 0 50 70 20 20 0 1 0 50 30z" fill="none" stroke="currentColor" stroke-width="0.5" />
    </svg>
  </div>

  <div class="container">
    <h1>Настройка Wi-Fi</h1>

    <div id="messageContainer" class="message-box"></div>

    <div class="wifi-status">
      <h3>Текущий статус подключения</h3>
      <div id="connectionStatus">
        <div class="scan-progress" id="statusLoading">
          <div class="spinner"></div>
          <p>Загрузка статуса подключения...</p>
        </div>
      </div>
      <div style="text-align: center; margin-top: 20px;">
        <button class="btn btn-secondary" onclick="updateWiFiStatus()" style="margin-right: 10px;">
          Обновить статус
        </button>
        <button class="btn btn-off" id="disconnectBtn" onclick="disconnectWiFi()" style="display:none;">
          Отключиться и перейти в режим точки доступа
        </button>
      </div>
    </div>

    <div class="divider">
      <span>Доступные сети</span>
    </div>

    <div style="text-align: center; margin-bottom: 25px;">
      <button class="btn btn-secondary" onclick="scanNetworks()" style="min-width: 200px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          style="margin-right: 8px;">
          <path d="M21 12a9 9 0 0 0-9-9 9 9 0 0 0-9 9 9 9 0 0 0 9 9 9 9 0 0 0 9-9z" />
          <path d="M12 2a10 10 0 0 1 10 10" />
          <path d="M12 6a6 6 0 0 1 6 6" />
          <path d="M12 10a2 2 0 0 1 2 2" />
        </svg>
        Сканировать сети
      </button>
    </div>

    <div class="scan-progress" id="scanLoading">
      <div class="spinner"></div>
      <p>Поиск доступных сетей...</p>
    </div>

    <div class="network-list" id="networkList"></div>

    <div class="divider">
      <span>Ручная настройка</span>
    </div>

    <div class="wifi-form-container">
      <div class="form-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 13a10 10 0 0 1 14 0"></path>
          <path d="M8.5 16.5a5 5 0 0 1 7 0"></path>
          <path d="M2 8.82a15 15 0 0 1 20 0"></path>
          <line x1="12" y1="20" x2="12.01" y2="20"></line>
        </svg>
      </div>

      <form id="wifiForm" onsubmit="saveWiFi(event)">
        <div class="manual-input-group">
          <div class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
              <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
              <line x1="6" y1="6" x2="6.01" y2="6"></line>
              <line x1="6" y1="18" x2="6.01" y2="18"></line>
            </svg>
          </div>
          <input type="text" id="ssid" name="ssid" placeholder="Введите имя сети (SSID)" required>
        </div>

        <div class="manual-input-group">
          <div class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </div>
          <input type="password" id="password" name="password" placeholder="Введите пароль (необязательно)">
          <button type="button" class="password-toggle" onclick="togglePassword()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>

        <button class="btn btn-on" type="submit" style="width: 100%; margin-top: 10px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            style="margin-right: 8px;">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          Сохранить и подключиться
        </button>
      </form>
    </div>

    <!-- Кнопка возврата на главную внизу -->
    <div class="bottom-nav">
      <a href="#" id="backLink" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>
        Вернуться на главную
      </a>
    </div>
  </div>

  <script>
    document.getElementById('backLink').href =
      window.location.hostname === '' ? 'index.html' : '/';

    let expandedNetworkId = null;
    let currentNetworks = [];

    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
    }

    function showMessage(type, title, text) {
      const messageContainer = document.getElementById('messageContainer');
      const typeClass = `message-${type}`;

      messageContainer.className = `message-box ${typeClass}`;
      messageContainer.innerHTML = `
        <div class="message-header">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            ${type === 'success' ? '<polyline points="20 6 9 17 4 12"></polyline>' :
          type === 'error' ? '<circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line>' :
            '<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line>'}
          </svg>
          ${title}
        </div>
        <p>${text}</p>
      `;
      messageContainer.style.display = 'block';

      if (type !== 'info') {
        setTimeout(() => {
          messageContainer.style.display = 'none';
        }, 5000);
      }
    }

    function toggleNetworkCard(networkId) {
      const card = document.getElementById(`network-${networkId}`);
      const allCards = document.querySelectorAll('.network-card');

      allCards.forEach(c => {
        if (c.id !== `network-${networkId}` && c.classList.contains('expanded')) {
          c.classList.remove('expanded');
        }
      });

      if (expandedNetworkId === networkId) {
        card.classList.remove('expanded');
        expandedNetworkId = null;
      } else {
        card.classList.add('expanded');
        expandedNetworkId = networkId;
      }
    }

    function connectFromCard(ssid, password = '') {
      document.getElementById('ssid').value = ssid;
      document.getElementById('password').value = password;

      saveWiFiData(ssid, password);
    }

    function scanNetworks() {
      const networkList = document.getElementById('networkList');
      const scanLoading = document.getElementById('scanLoading');

      networkList.innerHTML = '';
      scanLoading.style.display = 'block';
      expandedNetworkId = null;

      showMessage('info', 'Сканирование сетей', 'Поиск доступных Wi-Fi сетей...');

      fetch('/scanwifi')
        .then(response => response.json())
        .then(data => {
          scanLoading.style.display = 'none';
          currentNetworks = data.networks || [];

          if (currentNetworks.length > 0) {
            currentNetworks.forEach((network, index) => {
              const networkId = `net-${index}`;
              const signalPercent = Math.min(Math.max(((network.rssi + 100) / 70 * 100), 0), 100);
              const isOpen = network.encrypted === false || network.encrypted === "false";

              const card = document.createElement('div');
              card.className = 'network-card';
              card.id = `network-${networkId}`;

              let cardContent = `
                <div class="network-header" onclick="toggleNetworkCard('${networkId}')">
                  <div>
                    <div class="network-name">
                      ${isOpen ?
                  '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--success);">' +
                  '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>' +
                  '</svg>' :
                  '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--warning);">' +
                  '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>' +
                  '<path d="M7 11V7a5 5 0 0 1 10 0v4"></path>' +
                  '</svg>'
                }
                      ${network.ssid}
                    </div>
                    <div class="network-security"></div>
                  </div>
                  <div class="network-info">
                    <div style="display: flex; align-items: center; gap: 10px;">
                      <div class="signal-strength">
                        <div class="signal-level" style="width: ${signalPercent}%"></div>
                      </div>
                      <div class="network-rssi">${network.rssi} dBm</div>
                    </div>
                    <button class="network-expand-btn">
                      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"></polyline>
                      </svg>
                    </button>
                  </div>
                </div>
                <div class="network-connect-form">
              `;

              if (!isOpen) {
                cardContent += `
                  <form onsubmit="event.preventDefault(); connectFromCard('${network.ssid.replace(/'/g, "\\'")}', document.getElementById('password-${networkId}').value);">
                    <div class="input-group">
                      <div class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                      </div>
                      <input type="password" id="password-${networkId}" placeholder="Введите пароль для ${network.ssid}" required>
                      <button type="button" class="password-toggle" onclick="togglePasswordInCard('password-${networkId}')">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                          <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                      </button>
                    </div>
                    <button class="network-connect-btn" type="submit">
                      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                      </svg>
                      Сохранить и подключиться к ${network.ssid}
                    </button>
                  </form>
                `;
              } else {
                cardContent += `
                  <button class="network-connect-btn" onclick="connectFromCard('${network.ssid.replace(/'/g, "\\'")}')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    Подключиться к ${network.ssid}
                  </button>
                `;
              }

              cardContent += `</div>`;
              card.innerHTML = cardContent;
              networkList.appendChild(card);
            });
          } else {
            networkList.innerHTML = `
              <div style="text-align: center; padding: 40px; color: var(--gray);">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 15px;">
                  <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
                </svg>
                <h3 style="margin: 0 0 10px 0;">Сети не найдены</h3>
                <p style="margin: 0;">Попробуйте подойти ближе к роутеру или нажмите сканировать снова.</p>
              </div>
            `;
          }
        })
        .catch(error => {
          scanLoading.style.display = 'none';
          showMessage('error', 'Ошибка сканирования', 'Не удалось выполнить сканирование сетей. Пожалуйста, попробуйте снова.');
          console.error('Error scanning networks:', error);
        });
    }

    function togglePasswordInCard(inputId) {
      const passwordInput = document.getElementById(inputId);
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
    }

    function saveWiFi(event) {
      event.preventDefault();

      const form = document.getElementById('wifiForm');
      const formData = new FormData(form);
      const ssid = formData.get('ssid');
      const password = formData.get('password');

      saveWiFiData(ssid, password);
    }

    function saveWiFiData(ssid, password) {
      showMessage('info', 'Подключение...', `Подключение к ${ssid}. Это может занять несколько секунд.`);

      fetch('/savewifi', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: `ssid=${encodeURIComponent(ssid)}&password=${encodeURIComponent(password)}`
      })
        .then(response => {
          return response.json().catch(() => {
            return response.text().then(text => ({ status: response.ok ? 'success' : 'error', message: text }));
          });
        })
        .then(data => {
          if (data.status === 'success' || (typeof data === 'string' && data.includes('successfully'))) {
            showMessage('success', 'Подключено!', 'Wi-Fi успешно настроен! Устройство перезагрузится через несколько секунд...');
            setTimeout(() => {
              window.location.href = '/wifi-config';
            }, 2000);
          } else {
            showMessage('error', 'Не удалось подключиться к WiFi', data.message || 'Проверьте правильность данных и попробуйте снова.');
            setTimeout(() => {
              updateWiFiStatus();
            }, 1000);
          }
        })
        .catch(error => {
          console.error('Error saving WiFi:', error);
          showMessage('error', 'Ошибка подключения к WiFi', 'Пожалуйста, попробуйте позже.');
          updateWiFiStatus();
        });
    }

    function updateWiFiStatus() {
      const statusDiv = document.getElementById('connectionStatus');
      const disconnectBtn = document.getElementById('disconnectBtn');
      const statusLoading = document.getElementById('statusLoading');

      statusLoading.style.display = 'block';
      statusDiv.innerHTML = '';
      statusDiv.appendChild(statusLoading);

      fetch('/wifistatus')
        .then(response => response.json())
        .then(data => {
          statusLoading.style.display = 'none';

          let statusHtml = '<div class="status-grid">';

          if (data.connected) {
            const signalPercent = Math.min(Math.max(((data.rssi + 100) / 70 * 100), 0), 100);

            statusHtml += `
              <div class="status-item status-connected">
                <div class="status-label">Статус</div>
                <div class="status-value">Подключено</div>
              </div>
              <div class="status-item">
                <div class="status-label">Сеть</div>
                <div class="status-value">${data.ssid}</div>
              </div>
              <div class="status-item">
                <div class="status-label">IP адрес</div>
                <div class="status-value">${data.ip}</div>
              </div>
              <div class="status-item">
                <div class="status-label">Уровень сигнала</div>
                <div class="status-value">
                  <div style="display: flex; align-items: center; gap: 10px;">
                    <div class="signal-strength">
                      <div class="signal-level" style="width: ${signalPercent}%"></div>
                    </div>
                    ${data.rssi} dBm
                  </div>
                </div>
              </div>
            `;
            disconnectBtn.style.display = 'inline-block';
          } else if (data.mode === 'access_point') {
            statusHtml += `
              <div class="status-item status-ap">
                <div class="status-label">Статус</div>
                <div class="status-value">Режим точки доступа</div>
              </div>
              <div class="status-item">
                <div class="status-label">Имя точки доступа</div>
                <div class="status-value">${data.ssid}</div>
              </div>
              <div class="status-item">
                <div class="status-label">IP адрес</div>
                <div class="status-value">${data.ip}</div>
              </div>
              <div class="status-item">
                <div class="status-label">Режим</div>
                <div class="status-value">Точка доступа</div>
              </div>
            `;
            disconnectBtn.style.display = 'none';
          } else {
            statusHtml += `
              <div class="status-item status-disconnected">
                <div class="status-label">Статус</div>
                <div class="status-value">Не подключено</div>
              </div>
              <div class="status-item">
                <div class="status-label">Режим</div>
                <div class="status-value">Клиентский режим</div>
              </div>
              <div class="status-item">
                <div class="status-label">Сеть</div>
                <div class="status-value">Нет</div>
              </div>
              <div class="status-item">
                <div class="status-label">IP адрес</div>
                <div class="status-value">Не назначен</div>
              </div>
            `;
            disconnectBtn.style.display = 'none';
          }

          statusHtml += '</div>';
          statusDiv.innerHTML = statusHtml;
        })
        .catch(error => {
          statusLoading.style.display = 'none';
          statusDiv.innerHTML = `
            <div class="status-item status-disconnected">
              <div class="status-label">Статус</div>
              <div class="status-value">Ошибка загрузки</div>
            </div>
          `;
          console.error('Error fetching WiFi status:', error);
        });
    }

    function disconnectWiFi() {
      if (confirm('Вы уверены, что хотите отключиться и переключиться в режим точки доступа? Устройство перезагрузится.')) {
        showMessage('info', 'Отключение...', 'Переключение в режим точки доступа. Устройство перезагрузится.');

        fetch('/disconnectwifi', { method: 'POST' })
          .then(response => response.json())
          .then(data => {
            showMessage('success', 'Отключено', data.message || 'Отключение... Устройство перезагрузится.');
            setTimeout(() => {
              window.location.reload();
            }, 2000);
          })
          .catch(error => {
            console.error('Error disconnecting:', error);
            showMessage('error', 'Ошибка', 'Не удалось отключиться. Пожалуйста, попробуйте снова.');
          });
      }
    }

    function checkURLParams() {
      const urlParams = new URLSearchParams(window.location.search);

      if (urlParams.get('success') === 'true') {
        showMessage('success', 'Подключено!', 'Wi-Fi успешно настроен!');
        setTimeout(() => {
          window.history.replaceState({}, document.title, '/wifi-config');
        }, 5000);
      } else if (urlParams.get('error') === 'true') {
        showMessage('error', 'Ошибка подключения', 'Не удалось подключиться к Wi-Fi. Пожалуйста, попробуйте снова.');
        setTimeout(() => {
          window.history.replaceState({}, document.title, '/wifi-config');
        }, 5000);
      }
    }

    window.onload = function () {
      checkURLParams();
      updateWiFiStatus();
      setInterval(updateWiFiStatus, 10000);
    };
  </script>
</body>

</html>
