<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; margin: 20px; }
    .container { max-width: 500px; margin: 0 auto; }
    .scan-btn { margin-bottom: 20px; }
    .network-list { margin-bottom: 20px; }
    .network-item { padding: 10px; border: 1px solid #ddd; margin-bottom: 5px; cursor: pointer; }
    .network-item:hover { background-color: #f5f5f5; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; }
    input { width: 100%; padding: 8px; box-sizing: border-box; }
    button { background-color: #4CAF50; color: white; padding: 10px 15px; border: none; cursor: pointer; }
    button:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Wi-Fi Configuration</h2>
    <button class="scan-btn" onclick="scanNetworks()">Scan Networks</button>
    <div class="network-list" id="networkList"></div>
    <form action="/savewifi" method="post">
      <div class="form-group">
        <label for="ssid">Network SSID:</label>
        <input type="text" id="ssid" name="ssid" required>
      </div>
      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password">
      </div>
      <button type="submit">Save & Connect</button>
    </form>
  </div>
  <script>
    function scanNetworks() {
      fetch('/scanwifi')
        .then(response => response.json())
        .then(data => {
          const list = document.getElementById('networkList');
          list.innerHTML = '';
          data.networks.forEach(network => {
            const item = document.createElement('div');
            item.className = 'network-item';
            item.textContent = network.ssid + ' (' + network.rssi + ' dBm)';
            item.onclick = () => {
              document.getElementById('ssid').value = network.ssid;
            };
            list.appendChild(item);
          });
        });
    }
    // Автоматически сканировать сети при загрузке страницы
    window.onload = scanNetworks;
  </script>
</body>
</html>
