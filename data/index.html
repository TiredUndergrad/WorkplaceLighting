<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 LED Control</title>
  <link rel="stylesheet" href="/main.css">
</head>
<body>
  <div class="container">
    <h1>ESP32 LED Control</h1>
    <p>LED is currently <span id="led-state">OFF</span></p>
    <div class="button-container">
      <button class="on" onclick="sendRequest('/led/on')">Turn ON</button>
      <button class="off" onclick="sendRequest('/led/off')">Turn OFF</button>
    </div>
    <p>Ambient Light: <span id="ambient-light">Loading...</span></p> <!-- Отображение данных освещенности -->
  </div>
  <!-- <button onclick="window.location.href='wifi-config.html'">Wi-Fi Settings</button> -->
  <div class="nav-container">
    <a href="/wifi-config">Wi-Fi Settings</a>
  </div>

  <script>
    function sendRequest(url) {
      fetch(url, { method: 'POST' })
        .then(response => response.text())
        .then(data => {
          document.getElementById('led-state').innerText = data.includes('ON') ? 'ON' : 'OFF';
        });
    }

    // Функция для получения данных освещенности
    function fetchLightData() {
      fetch('/light')
        .then(response => response.json())
        .then(data => {
          // Обновляем уровень освещенности на странице
          document.getElementById('ambient-light').innerText = data.ambient_light;
        })
        .catch(error => {
          console.log('Error fetching light data:', error);
        });
    }
    
    // Обновляем данные освещенности каждую секунду
    setInterval(fetchLightData, 500);
  </script>
</body>
</html>
